target_distance_m: 10.0
forward_command: 2.0
old_forward_command_default: 12.0
new_forward_command_default: 2.0
ticks_per_sec: 30
max_duration_s: 120.0
warmup_ticks: 10
world: "SimpleUnderwater"
dvl_forward_index: 0
dvl_forward_sign: 1.0
speed_warning_threshold_mps: 1.0
max_dvl_speed_warning_threshold_mps: 1.5
diagnostic_distance_check: false
show_viewport: false
current_x: 0.0
current_y: 1.0
current_z: 0.0
current_magnitude: 1.0
current_api_method: "env.set_ocean_currents(agent_name, velocity)"
current_application_mode: "every_step"
current_policy: "Apply the current before every simulation step; the local HoloOcean 2.2.2 API documents current as an enqueued command and does not state that one call persists."
dt_policy: "Use simulator state time if present; otherwise use measured wall-clock loop dt. Fall back to 1 / ticks_per_sec only if dt is invalid."
sensor_policy:
  DVL: "used for forward distance estimation"
  IMU: "available for future estimation, not used in this experiment"
  Depth: "available for future depth control, not used in this experiment"
  Pose: "logged during the run and used after the run for evaluation only"
  Velocity: "logged during the run and used after the run for evaluation only"
